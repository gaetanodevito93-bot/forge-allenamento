<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORGE — Allenamento</title>
<meta name="description" content="La tua scheda di allenamento: giorni, esercizi, serie e progressi. Funziona anche offline.">
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0A0A0F">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--bg2:#0E0E15;--surface:#15151F;--surface2:#1D1D2A;--border:#2A2A3A;--text:#F2F2F5;--muted:#8A8A9A;--volt:#C6FF3D;--volt-dim:#9FCF2E;--coral:#FF5468;--amber:#FFB020;--radius:16px;--shadow:0 18px 50px rgba(0,0,0,.55)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:Manrope,system-ui,-apple-system,sans-serif;background-color:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden;background-image:radial-gradient(circle at 15% -10%,rgba(198,255,61,.1),transparent 40%),radial-gradient(circle at 100% 0%,rgba(255,84,104,.06),transparent 35%)}
::selection{background:var(--volt);color:#000}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
header{position:sticky;top:0;z-index:40;backdrop-filter:blur(18px);background:rgba(10,10,15,.72);border-bottom:1px solid var(--border)}
.header-inner{max-width:900px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(145deg,var(--volt),var(--volt-dim));box-shadow:0 6px 20px rgba(198,255,61,.35);flex-shrink:0}
.logo-mark svg{width:22px;height:22px}
.logo h1{font-family:Anton,sans-serif;font-size:24px;letter-spacing:1px;line-height:1}
.logo .prog-name{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.header-actions{margin-left:auto;display:flex;gap:8px}
.icon-btn{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;transition:background-color .2s,border-color .2s,transform .12s}
.icon-btn:hover{background:var(--surface2);border-color:#3A3A4D}
.icon-btn:active{transform:scale(.94)}
.icon-btn svg{width:21px;height:21px;stroke:var(--text);stroke-width:2.1}
.day-bar{max-width:900px;margin:0 auto;padding:12px 18px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.day-bar::-webkit-scrollbar{display:none}
.day-tab{white-space:nowrap;padding:9px 16px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:700;font-size:13px;transition:.2s;display:flex;align-items:center;gap:7px;flex-shrink:0}
.day-tab:hover{color:var(--text);border-color:#3A3A4D}
.day-tab.active{background:var(--volt);color:#0A0A0F;border-color:var(--volt);box-shadow:0 6px 18px rgba(198,255,61,.28)}
.day-tab .dot{width:7px;height:7px;border-radius:50%;background:var(--volt-dim);opacity:.7}
.day-tab.active .dot{background:#0A0A0F;opacity:1}
.day-tab.add-day{background:transparent;border-style:dashed;color:var(--volt)}
main{max-width:900px;margin:0 auto;padding:20px 18px 140px}
.day-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:8px 0 20px}
.day-head .title-block{min-width:0;flex:1}
.day-head .title-block h2{font-family:Anton,sans-serif;font-size:clamp(21px,6vw,32px);letter-spacing:.5px;line-height:1.08;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.day-head .title-block p{color:var(--muted);font-size:13px;font-weight:600;margin-top:4px}
.day-progress{text-align:right;flex-shrink:0}
.day-progress .ring{position:relative;width:58px;height:58px;margin-left:auto}
.day-progress .ring svg{transform:rotate(-90deg)}
.day-progress .ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:Anton,sans-serif;font-size:15px}
/* ── strip a schede degli esercizi ── */
.ex-tabs{display:none;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 2px 4px;margin-bottom:14px;scroll-padding:0 40px}
.ex-tabs::-webkit-scrollbar{display:none}
.ex-tabs:not(:empty){display:flex}
.ex-tab{white-space:nowrap;max-width:220px;padding:8px 14px 8px 8px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:700;font-size:13px;transition:.2s;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ex-tab:hover{color:var(--text);border-color:#3A3A4D}
.ex-tab.active{background:var(--surface2);color:var(--text);border-color:var(--volt)}
.ex-tab-num{font-family:Anton,sans-serif;font-size:12px;width:24px;height:24px;flex-shrink:0;border-radius:50%;background:var(--bg);display:grid;place-items:center;color:var(--volt)}
.ex-tab.active .ex-tab-num{background:var(--volt);color:#0A0A0F}
.ex-tab.done .ex-tab-num{background:var(--volt);color:#0A0A0F}
.ex-tab-num svg{width:14px;height:14px;stroke:currentColor;stroke-width:3;fill:none}
.ex-tab-name{overflow:hidden;text-overflow:ellipsis}
/* ── barra di navigazione tra le schede: fissata in basso ── */
.ex-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:36;justify-content:center;
  padding:10px 18px calc(10px + env(safe-area-inset-bottom));
  background:rgba(10,10,15,.82);backdrop-filter:blur(18px);border-top:1px solid var(--border);
  transition:transform .22s cubic-bezier(.2,.8,.2,1)}
.ex-nav:not(:empty){display:flex}
.ex-nav-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;max-width:900px}
/* mentre si digita (tastiera aperta) la barra scende per non intralciare */
body.kb .ex-nav{transform:translateY(130%)}
.ex-nav-btn{flex:1;padding:12px 10px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:14px;transition:.18s}
.ex-nav-btn:hover:not(:disabled){border-color:var(--volt-dim)}
.ex-nav-btn:active:not(:disabled){transform:scale(.97)}
.ex-nav-btn:disabled{opacity:.35;cursor:default}
.ex-nav-btn.next{background:var(--volt);color:#0A0A0F;border-color:var(--volt)}
.ex-nav-count{font-family:Anton,sans-serif;font-size:14px;color:var(--muted);flex-shrink:0;letter-spacing:.5px}
.ex-list{display:flex;flex-direction:column;gap:14px}
/* schede: mostra solo l'esercizio attivo (tranne durante il riordino) */
.ex-list.tabs:not(.compact) > .ex-card:not(.active){display:none}
.ex-card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .25s,opacity .25s;animation:rise .45s cubic-bezier(.2,.8,.2,1) both}
@keyframes rise{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:none}}
.ex-card.done{border-color:rgba(198,255,61,.5)}
.ex-card.done .ex-top{background:rgba(198,255,61,.05)}
.ex-top{padding:16px 16px 12px;display:flex;gap:12px;align-items:flex-start}
.ex-top,.set-idx,.sets-head{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.ex-num{font-family:Anton,sans-serif;font-size:15px;width:34px;height:34px;flex-shrink:0;border-radius:10px;background:var(--surface2);display:grid;place-items:center;color:var(--volt)}
.ex-card.done .ex-num{background:var(--volt);color:#0A0A0F}
.ex-info{flex:1;min-width:0}
.ex-info h3{font-size:17px;font-weight:800;letter-spacing:-.2px;overflow-wrap:anywhere}
.ex-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--surface2);color:var(--muted);display:inline-flex;align-items:center;gap:5px}
.chip svg{width:13px;height:13px;stroke:var(--volt-dim)}
.chip.rest{color:var(--amber)}
.chip.rest svg{stroke:var(--amber)}
.ex-note{margin-top:10px;font-size:12.5px;color:var(--muted);font-style:italic;border-left:2px solid var(--border);padding-left:10px}
.ex-opts-btn{flex-shrink:0;align-self:flex-start;width:38px;height:38px;display:grid;place-items:center;border-radius:10px;background:var(--surface2);border:1px solid var(--border);transition:.18s}
.ex-opts-btn:hover{border-color:var(--volt-dim);background:#26263A}
.ex-opts-btn:active{transform:scale(.95)}
.ex-opts-btn svg{width:17px;height:17px;fill:var(--volt)}
.ex-card.dragging{z-index:120;box-shadow:0 24px 64px rgba(0,0,0,.75);border-color:var(--volt);cursor:grabbing;opacity:.97;animation:buzz .2s linear 3;will-change:top}
/* durante il trascinamento tutte le finestre si riducono al solo titolo */
.ex-list.compact .ex-meta,.ex-list.compact .ex-note,.ex-list.compact .sets{display:none}
.ex-list.compact .ex-top{padding:12px 16px;align-items:center}
.ex-list.compact .ex-card{animation:none}
@keyframes buzz{0%,100%{transform:scale(1.015)}25%{transform:scale(1.015) translateX(-2.5px)}75%{transform:scale(1.015) translateX(2.5px)}}
.drag-ph{border:2px dashed var(--volt-dim);border-radius:var(--radius);background:rgba(198,255,61,.06);flex-shrink:0}
body.dragging-active{cursor:grabbing;user-select:none}
.sets{padding:4px 16px 16px}
.sets-head,.set-row{display:grid;grid-template-columns:34px 1fr 1fr 44px;gap:8px;align-items:center}
.sets-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;padding:6px 4px}
.set-row{padding:5px 0}
.set-idx{font-family:Anton,sans-serif;font-size:13px;color:var(--muted);text-align:center}
.set-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 8px;color:var(--text);font-size:14px;font-weight:700;text-align:center;transition:border-color .2s}
.set-input:focus{outline:none;border-color:var(--volt)}
.set-input::placeholder{color:#4A4A5A;font-weight:600}
.set-check{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);background:var(--bg);display:grid;place-items:center;transition:.18s;margin-left:auto}
.set-check svg{width:18px;height:18px;stroke:var(--muted);transition:.18s}
.set-check:hover{border-color:var(--volt-dim)}
.set-check.on{background:var(--volt);border-color:var(--volt)}
.set-check.on svg{stroke:#0A0A0F;stroke-width:3}
.set-row.on .set-input{opacity:.55}
.set-prev{grid-column:2/4;font-size:11px;font-weight:600;color:var(--muted);text-align:center;margin-top:-1px;padding-bottom:2px}
.set-prev b{color:#B4B4C4;font-weight:700}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty svg{width:56px;height:56px;stroke:var(--border);margin-bottom:16px}
.empty h3{font-family:Anton,sans-serif;font-size:22px;color:var(--text);margin-bottom:8px}
.empty p{font-size:14px;max-width:320px;margin:0 auto 20px}
.fab{position:fixed;right:20px;bottom:24px;z-index:35;height:56px;padding:0 22px 0 18px;border-radius:999px;background:var(--volt);color:#0A0A0F;font-weight:800;font-size:15px;display:flex;align-items:center;gap:9px;box-shadow:0 12px 34px rgba(198,255,61,.4);transition:transform .15s}
.fab:active{transform:scale(.95)}
.fab svg{width:22px;height:22px;stroke:#0A0A0F;stroke-width:2.5}
.fab-save{left:20px;right:auto;bottom:calc(80px + env(safe-area-inset-bottom));background:var(--surface);color:var(--text);border:1px solid var(--volt);box-shadow:0 12px 34px rgba(0,0,0,.5)}
.fab-save svg{stroke:var(--volt)}
.cmp-ex{margin-bottom:18px}
.cmp-ex h4{font-size:14px;font-weight:800;margin-bottom:8px}
.cmp-head,.cmp-row{display:grid;grid-template-columns:30px 1fr 26px 1fr;gap:8px;align-items:center;padding:5px 0}
.cmp-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
.cmp-row{font-size:13.5px;font-weight:700;border-bottom:1px solid rgba(42,42,58,.5)}
.cmp-row .n{font-family:Anton,sans-serif;color:var(--muted);text-align:center;font-size:12px}
.cmp-row .v{text-align:center}
.cmp-row .prev{color:var(--muted)}
.cmp-row .arrow{text-align:center;font-size:15px}
.cmp-row .arrow.up{color:var(--volt)}
.cmp-row .arrow.down{color:var(--coral)}
.cmp-row .arrow.eq{color:var(--muted)}
.btn{padding:12px 18px;border-radius:12px;font-weight:700;font-size:14px;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--volt);color:#0A0A0F}
.btn-primary:hover{background:#D4FF5F}
.btn-ghost{background:var(--surface2);color:var(--text)}
.btn-ghost:hover{background:#26263A}
.btn-danger{background:rgba(255,84,104,.12);color:var(--coral)}
.btn-danger:hover{background:rgba(255,84,104,.2)}
.btn-block{width:100%}
.btn:active{transform:scale(.97)}
.overlay{position:fixed;inset:0;z-index:60;background:rgba(5,5,9,.72);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
@media(min-width:640px){.overlay{align-items:center;padding:20px}}
.modal{width:100%;max-width:520px;max-height:92vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;box-shadow:var(--shadow);transform:translateY(30px);transition:transform .3s cubic-bezier(.2,.9,.2,1)}
@media(min-width:640px){.modal{border-radius:24px}}
.overlay.open .modal{transform:none}
.modal-head{position:sticky;top:0;background:var(--surface);padding:20px 22px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);z-index:2}
.modal-head h3{font-family:Anton,sans-serif;font-size:21px;letter-spacing:.5px}
.modal-body{padding:20px 22px 24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 13px;color:var(--text);font-size:15px;font-weight:600;transition:border-color .2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--volt)}
.field textarea{resize:vertical;min-height:70px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-foot{display:flex;gap:10px;margin-top:8px}
.dropzone{border:2px dashed var(--border);border-radius:16px;padding:34px 20px;text-align:center;transition:.2s;cursor:pointer;background:var(--bg)}
.dropzone:hover,.dropzone.drag{border-color:var(--volt);background:rgba(198,255,61,.04)}
.dropzone svg{width:42px;height:42px;stroke:var(--volt-dim);margin-bottom:12px}
.dropzone h4{font-size:15px;font-weight:800;margin-bottom:5px}
.dropzone p{font-size:12.5px;color:var(--muted)}
.hint{font-size:12px;color:var(--muted);background:var(--bg);border-radius:11px;padding:12px 14px;margin-top:14px;border:1px solid var(--border)}
.hint code{color:var(--volt);font-family:ui-monospace,monospace;font-size:11.5px}
.import-summary{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:16px}
.import-summary .is-name{font-weight:800;font-size:15px}
.import-summary .is-days{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.import-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.ic-opt{display:flex;align-items:center;gap:13px;text-align:left;width:100%;padding:14px 15px;border-radius:13px;background:var(--surface2);border:1px solid var(--border);transition:.18s}
.ic-opt:hover{border-color:var(--volt);background:#26263A}
.ic-opt:active{transform:scale(.985)}
.ic-opt .ic-ic{width:40px;height:40px;flex-shrink:0;border-radius:11px;background:var(--surface);display:grid;place-items:center}
.ic-opt .ic-ic svg{width:21px;height:21px;stroke:var(--volt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ic-opt .ic-tx{display:flex;flex-direction:column;gap:2px;min-width:0}
.ic-opt .ic-tx strong{font-size:14.5px;font-weight:800}
.ic-opt .ic-tx span{font-size:12px;color:var(--muted);line-height:1.4}
.modal-text{color:var(--muted);font-size:14px;line-height:1.55;margin-bottom:18px}
.modal-foot.stack{flex-direction:column;gap:10px}
.or-sep{display:flex;align-items:center;gap:12px;margin:16px 0 12px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.2px}
.or-sep::before,.or-sep::after{content:"";height:1px;flex:1;background:var(--border)}
.paste-json{width:100%;min-height:130px;resize:vertical;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;line-height:1.5}
.paste-json:focus{outline:none;border-color:var(--volt)}
.paste-json::placeholder{color:var(--muted)}
/* ── viste: home / allenamento / progressi ── */
#homeView,#progressView{display:none}
body[data-view="home"] #homeView{display:flex}
body[data-view="training"] #trainingView{display:block}
body[data-view="progress"] #progressView{display:block}
body[data-view="home"] #trainingView,body[data-view="home"] #progressView,
body[data-view="training"] #homeView,body[data-view="training"] #progressView,
body[data-view="progress"] #homeView,body[data-view="progress"] #trainingView{display:none}
body:not([data-view="training"]) #fabSave{display:none!important}
body:not([data-view="progress"]) #fabAddMeas{display:none!important}
/* ── splash ── */
#splash{position:fixed;inset:0;z-index:100;background:var(--bg);display:grid;place-items:center;transition:opacity .5s ease,visibility .5s}
#splash.hide{opacity:0;visibility:hidden}
.splash-in{display:flex;flex-direction:column;align-items:center;gap:16px;animation:splashPop .6s cubic-bezier(.2,.8,.2,1) both}
@keyframes splashPop{0%{opacity:0;transform:translateY(10px) scale(.96)}100%{opacity:1;transform:none}}
.splash-mark{width:96px;height:96px;border-radius:26px;display:grid;place-items:center;background:linear-gradient(145deg,var(--volt),var(--volt-dim));box-shadow:0 18px 50px rgba(198,255,61,.4);animation:splashPulse 1.6s ease-in-out infinite}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.splash-mark svg{width:52px;height:52px}
.splash-in .sw{font-family:Anton,sans-serif;font-size:42px;letter-spacing:2px;line-height:1}
.splash-in .st{font-size:12.5px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.splash-load{width:120px;height:4px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:6px}
.splash-load i{display:block;height:100%;width:40%;border-radius:99px;background:var(--volt);animation:splashBar 1.05s ease-in-out infinite}
@keyframes splashBar{0%{transform:translateX(-130%)}100%{transform:translateX(330%)}}
/* ── home ── */
#homeView{min-height:100vh;min-height:100dvh;flex-direction:column;justify-content:center;max-width:560px;margin:0 auto;padding:40px 22px calc(48px + env(safe-area-inset-bottom))}
.home-brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;margin-bottom:38px}
.home-mark{width:74px;height:74px;border-radius:21px;display:grid;place-items:center;background:linear-gradient(145deg,var(--volt),var(--volt-dim));box-shadow:0 14px 40px rgba(198,255,61,.35)}
.home-mark svg{width:42px;height:42px}
.home-brand h1{font-family:Anton,sans-serif;font-size:46px;letter-spacing:1.5px;line-height:1}
.home-brand p{color:var(--muted);font-size:14px;font-weight:600}
.home-btns{display:flex;flex-direction:column;gap:15px}
.home-btn{display:flex;align-items:center;gap:17px;text-align:left;padding:20px;border-radius:20px;border:1px solid var(--border);background:linear-gradient(180deg,var(--surface),var(--bg2));transition:border-color .18s,transform .12s}
.home-btn:hover{border-color:#3A3A4D}
.home-btn:active{transform:scale(.98)}
.home-btn .hb-ic{width:54px;height:54px;flex-shrink:0;border-radius:16px;display:grid;place-items:center}
.home-btn .hb-ic svg{width:27px;height:27px;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.home-btn.train .hb-ic{background:var(--volt)}
.home-btn.train .hb-ic svg{stroke:#0A0A0F}
.home-btn.prog .hb-ic{background:var(--surface2)}
.home-btn.prog .hb-ic svg{stroke:var(--volt)}
.home-btn .hb-tx{min-width:0;flex:1}
.home-btn .hb-tx strong{display:block;font-size:20px;font-weight:800;letter-spacing:-.2px}
.home-btn .hb-tx span{font-size:12.5px;color:var(--muted);font-weight:600}
.home-btn .hb-arrow{color:var(--muted);display:flex}
.home-btn .hb-arrow svg{width:22px;height:22px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
/* ── progressi ── */
#progressMain{max-width:900px;margin:0 auto;padding:20px 18px calc(120px + env(safe-area-inset-bottom))}
.prog-hero{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.prog-hero .ph-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:12px}
.prog-hero .ph-date{font-size:11.5px;color:var(--volt-dim);font-weight:800;text-transform:uppercase;letter-spacing:.6px}
.prog-hero .ph-count{font-size:12px;color:var(--muted);font-weight:700}
.prog-hero .ph-weight{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.prog-hero .ph-weight .val{font-family:Anton,sans-serif;font-size:46px;line-height:1}
.prog-hero .ph-weight .u{font-size:15px;color:var(--muted);font-weight:700}
.prog-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.prog-chip{background:var(--surface2);border-radius:12px;padding:9px 12px}
.prog-chip .pc-l{font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.prog-chip .pc-v{font-size:16px;font-weight:800;margin-top:3px;display:flex;align-items:baseline;gap:5px}
.prog-chip .pc-v .unit{font-size:11px;color:var(--muted);font-weight:700}
.prog-sec-title{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:24px 2px 11px}
.wchart{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px 8px}
.wchart svg{width:100%;height:auto;display:block}
.wchart .wc-cap{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:0 4px 6px}
.wchart .wc-cap .t{font-size:12px;color:var(--muted);font-weight:700}
.wchart .wc-cap .d{font-size:13.5px;font-weight:800;white-space:nowrap}
.dl{font-weight:800;color:#9AA0AE;font-size:.8em;white-space:nowrap}
.dl.eq{opacity:.6}
.ph-weight .dl{font-size:15px}
.cmp2-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;-webkit-overflow-scrolling:touch}
table.cmp2{border-collapse:collapse;width:100%;font-size:13px}
.cmp2 th,.cmp2 td{padding:11px 13px;text-align:right;white-space:nowrap;border-bottom:1px solid rgba(42,42,58,.6)}
.cmp2 thead th{position:sticky;top:0;background:var(--surface2);font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800;cursor:pointer}
.cmp2 th.metric,.cmp2 td.metric{position:sticky;left:0;text-align:left;background:var(--surface);font-weight:800;z-index:1}
.cmp2 thead th.metric{background:var(--surface2);z-index:3;cursor:default}
.cmp2 td .cv{font-weight:800}
.cmp2 td .dl{display:block;margin-top:3px}
.cmp2 td.latest,.cmp2 thead th.latest{background:rgba(198,255,61,.07)}
.cmp2 td.metric .unit{color:var(--muted);font-weight:700;font-size:11px}
.cmp2 tbody tr:last-child th,.cmp2 tbody tr:last-child td{border-bottom:none}
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.meas-grid .field{margin-bottom:0}
.field label .u2{color:var(--muted);font-weight:700;text-transform:none;letter-spacing:0}
.menu-list{display:flex;flex-direction:column;gap:4px}
.sheet-btn{width:100%;padding:15px 16px;display:flex;align-items:center;gap:14px;font-size:15px;font-weight:700;border-radius:12px;transition:background .15s;text-align:left}
.sheet-btn:hover{background:var(--surface2)}
.sheet-btn svg{width:20px;height:20px;stroke:var(--muted);flex-shrink:0}
.sheet-btn.danger{color:var(--coral)}
.sheet-btn.danger svg{stroke:var(--coral)}
.timer-overlay{position:fixed;inset:0;z-index:80;background:radial-gradient(circle at 50% 40%,#12121C,#06060A);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.timer-overlay.open{opacity:1;pointer-events:auto}
.timer-overlay .label{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--volt)}
.timer-overlay .next{color:var(--muted);font-size:14px;font-weight:600;margin-bottom:18px;text-align:center}
.timer-ring{position:relative;width:min(78vw,320px);height:min(78vw,320px)}
.timer-ring svg{transform:rotate(-90deg);width:100%;height:100%}
.timer-ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-ring .num .t{font-family:Anton,sans-serif;font-size:76px;line-height:1;letter-spacing:1px}
.timer-ring .num small{color:var(--muted);font-size:13px;font-weight:700;letter-spacing:1px;margin-top:4px}
.timer-adjust{display:flex;gap:12px;margin-top:34px}
.timer-adjust button{width:64px;height:64px;border-radius:50%;background:var(--surface);border:1px solid var(--border);font-family:Anton,sans-serif;font-size:16px;color:var(--text);transition:.15s}
.timer-adjust button:hover{background:var(--surface2);border-color:var(--volt-dim)}
.timer-adjust button:active{transform:scale(.92)}
.timer-skip{margin-top:26px;padding:15px 40px;border-radius:999px;background:var(--volt);color:#0A0A0F;font-weight:800;font-size:16px;transition:.15s}
.timer-skip:active{transform:scale(.96)}
.timer-pause{margin-top:14px;color:var(--muted);font-weight:700;font-size:13px}
#toast{position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:999px;font-weight:700;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;display:flex;align-items:center;gap:9px}

#toast svg{width:17px;height:17px;stroke:var(--volt)}

<script>
'use strict';
/* ═══════════════ FORGE — scheda di allenamento ═══════════════ */

const LS_KEY = 'forge_v1';

const ICONS = {
  reps: '<svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>',
  weight: '<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 6.5 17.5 17.5"></path><rect x="2.5" y="9" width="4" height="6" rx="1"></rect><rect x="17.5" y="9" width="4" height="6" rx="1"></rect></svg>',
  rest: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>',
  dots: '<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.7"></circle><circle cx="12" cy="12" r="1.7"></circle><circle cx="19" cy="12" r="1.7"></circle></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>',
  replace: '<svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 22l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>',
  append: '<svg viewBox="0 0 24 24"><path d="M3 6h13M3 12h8M3 18h8"></path><path d="M18 10v8M22 14h-8"></path></svg>'
};

const DEFAULT_STATE = () => ({
  programName: 'Il mio programma',
  activeDay: 0,
  days: [{
    name: 'Giorno A — Full Body',
    exercises: [
      { name: 'Panca piana', sets: 4, reps: '8-12', weight: 50, restSec: 90, note: 'Controlla la discesa' },
      { name: 'Plank', sets: 3, reps: '45s', weight: null, restSec: 60, note: 'Addome contratto' },
      { name: 'Squat con bilanciere', sets: 4, reps: '8-10', weight: 60, restSec: 120, note: 'Schiena dritta, scendi sotto il parallelo' },
      { name: 'Rematore manubrio', sets: 3, reps: '10-12', weight: 22, restSec: 75, note: '' }
    ]
  }]
});

/* ── stato ── */
let state = load();

function ensureLog(ex) {
  if (!Array.isArray(ex.log)) ex.log = [];
  while (ex.log.length < ex.sets) ex.log.push({ reps: '', weight: '', done: false });
  ex.log.length = ex.sets;
  return ex;
}
function normalizeState(s) {
  if (!s || !Array.isArray(s.days) || !s.days.length) throw new Error('stato non valido');
  s.programName = String(s.programName || 'Il mio programma');
  s.activeDay = Math.min(Math.max(0, s.activeDay | 0), s.days.length - 1);
  s.days.forEach(d => { d.name = String(d.name || 'Giorno'); (d.exercises || (d.exercises = [])).forEach(ensureLog); });
  if (!s.history || typeof s.history !== 'object' || Array.isArray(s.history)) s.history = {};
  if (!Array.isArray(s.measurements)) s.measurements = [];
  s.measurements = s.measurements
    .filter(m => m && typeof m === 'object' && m.date)
    .map(m => {
      const values = {};
      if (m.values && typeof m.values === 'object') {
        for (const k in m.values) { const n = parseFloat(m.values[k]); if (!isNaN(n)) values[k] = n; }
      }
      return {
        id: String(m.id || ('m' + Math.random().toString(36).slice(2, 9))),
        date: String(m.date),
        values,
        note: String(m.note || '')
      };
    });
  return s;
}
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return normalizeState(JSON.parse(raw));
  } catch (_) {}
  return normalizeState(DEFAULT_STATE());
}
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) {}
}

/* ── helpers ── */
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const day = () => state.days[state.activeDay];
const buzz = p => { try { navigator.vibrate && navigator.vibrate(p); } catch (_) {} };
function fmtRest(sec) { const m = Math.floor(sec / 60), s = sec % 60; return m + ':' + String(s).padStart(2, '0'); }
function parseRest(v) {
  v = String(v == null ? '' : v).trim();
  if (!v) return 90;
  if (v.includes(':')) { const [m, s] = v.split(':'); return Math.max(0, (parseInt(m, 10) || 0) * 60 + (parseInt(s, 10) || 0)); }
  const n = parseFloat(v.replace(',', '.'));
  return isNaN(n) ? 90 : Math.max(0, Math.round(n));
}
function fmtDateTs(ts) { return new Date(ts).toLocaleDateString('it-IT', { day: 'numeric', month: 'short' }); }
function firstNum(v) { const m = String(v == null ? '' : v).replace(',', '.').match(/-?\d+(\.\d+)?/); return m ? parseFloat(m[0]) : null; }
// ultima sessione salvata per questo giorno; se possibile una di un giorno
// precedente a oggi (così "oggi vs ultima volta" resta sensato dopo il salvataggio)
function lastSessionFor(dayName) {
  const arr = state.history[dayName];
  if (!arr || !arr.length) return null;
  const today = new Date().toDateString();
  for (let i = arr.length - 1; i >= 0; i--) {
    if (new Date(arr[i].ts).toDateString() !== today) return arr[i];
  }
  return arr[arr.length - 1];
}
function prevExercise(session, name) {
  if (!session) return null;
  const n = name.trim().toLowerCase();
  return session.exercises.find(e => e.name.trim().toLowerCase() === n) || null;
}
let toastT = null;
function toast(msg) {
  const t = $('toast');
  t.innerHTML = ICONS.check + esc(msg);
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2600);
}
function downloadText(name, text, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: mime || 'text/plain;charset=utf-8' }));
  a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

/* ── render ── */
function render() { renderDayBar(); renderDayHead(); renderList(); $('progName').textContent = state.programName; }

function renderDayBar() {
  $('dayBar').innerHTML = state.days.map((d, i) =>
    `<button class="day-tab${i === state.activeDay ? ' active' : ''}" data-day="${i}" data-testid="day-tab-${i}"><span class="dot"></span>${esc(d.name)}</button>`
  ).join('') + `<button class="day-tab add-day" data-testid="add-day-btn">+ Giorno</button>`;
}

function dayCounts() {
  let tot = 0, done = 0;
  day().exercises.forEach(ex => { tot += ex.sets; done += ex.log.filter(l => l.done).length; });
  return { tot, done };
}
function renderDayHead() {
  const d = day(), { tot, done } = dayCounts();
  const n = d.exercises.length;
  const C = 2 * Math.PI * 24;
  const p = tot ? done / tot : 0;
  const last = lastSessionFor(d.name);
  updateFabSave();
  $('dayHead').innerHTML = `
    <div class="title-block">
      <h2 data-testid="day-title" title="${esc(d.name)}">${esc(d.name)}</h2>
      <p>${n} ${n === 1 ? 'esercizio' : 'esercizi'} · ${done}/${tot} serie completate${last ? ` · ultima volta ${fmtDateTs(last.ts)}` : ''}</p>
    </div>
    <div class="day-progress"><div class="ring">
      <svg width="58" height="58"><circle cx="29" cy="29" r="24" fill="none" stroke="#1D1D2A" stroke-width="6"></circle>
      <circle cx="29" cy="29" r="24" fill="none" stroke="#C6FF3D" stroke-width="6" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C * (1 - p)}" style="transition:stroke-dashoffset .5s"></circle></svg>
      <div class="pct" style="color:${p >= 1 ? 'var(--volt)' : '#F2F2F5'}">${Math.round(p * 100)}%</div>
    </div></div>`;
}

function cardHTML(ex, i, session, isActive) {
  const chips = [
    `<span class="chip">${ICONS.reps}${ex.sets}×${esc(ex.reps)}</span>`,
    ex.weight != null && ex.weight !== '' ? `<span class="chip">${ICONS.weight}${esc(ex.weight)} kg</span>` : '',
    `<span class="chip rest">${ICONS.rest}${fmtRest(ex.restSec)} recupero</span>`
  ].join('');
  const prevEx = prevExercise(session, ex.name);
  const rows = ex.log.map((l, j) => {
    const ps = prevEx && prevEx.sets[j];
    let prevLine = '';
    if (ps && (ps.reps || ps.weight)) {
      prevLine = `<div class="set-prev">ultima volta: <b>${esc(ps.reps || '—')}${ps.weight ? ` × ${esc(ps.weight)} kg` : ''}</b></div>`;
    } else if (ps && ps.done) {
      prevLine = `<div class="set-prev">ultima volta: <b>✓ completata</b></div>`;
    }
    return `<div class="set-row${l.done ? ' on' : ''}">
    <div class="set-idx">${j + 1}</div>
    <input class="set-input" data-testid="reps-${i}-${j}" data-ex="${i}" data-set="${j}" data-k="reps" inputmode="text" placeholder="${esc(ex.reps)}" value="${esc(l.reps)}">
    <input class="set-input" data-testid="weight-${i}-${j}" data-ex="${i}" data-set="${j}" data-k="weight" inputmode="decimal" placeholder="${ex.weight != null && ex.weight !== '' ? esc(ex.weight) : '—'}" value="${esc(l.weight)}">
    <button class="set-check${l.done ? ' on' : ''}" data-testid="set-check-${i}-${j}" data-ex="${i}" data-set="${j}">${ICONS.check}</button>${prevLine}</div>`;
  }).join('');
  const allDone = ex.sets > 0 && ex.log.every(l => l.done);
  return `<div class="ex-card${allDone ? ' done' : ''}${isActive ? ' active' : ''}" data-testid="exercise-card-${i}" data-exidx="${i}" title="Tieni premuto per spostare">
    <div class="ex-top">
      <div class="ex-num">${i + 1}</div>
      <div class="ex-info">
        <h3 data-testid="exercise-name-${i}">${esc(ex.name)}</h3>
        <div class="ex-meta">${chips}</div>
        ${ex.note ? `<div class="ex-note">${esc(ex.note)}</div>` : ''}
      </div>
      <button class="ex-opts-btn" data-testid="exercise-menu-${i}" data-exidx="${i}" title="Opzioni esercizio">${ICONS.dots}</button>
    </div>
    <div class="sets">
      <div class="sets-head"><span>Serie</span><span style="text-align:center">Ripetizioni</span><span style="text-align:center">Peso (kg)</span><span></span></div>
      <div class="set-rows">${rows}</div>
    </div></div>`;
}

let activeEx = 0;
function exDone(ex) { return ex.sets > 0 && ex.log.every(l => l.done); }

function renderList() {
  const exs = day().exercises;
  if (!exs.length) {
    $('exList').classList.remove('tabs', 'compact');
    $('exList').innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"></path><rect x="2.5" y="9" width="4" height="6" rx="1"></rect><rect x="17.5" y="9" width="4" height="6" rx="1"></rect><path d="M6.5 12h11"></path></svg>
      <h3>Nessun esercizio</h3>
      <p>Aggiungi il primo esercizio di questo giorno oppure importa una scheda JSON.</p>
      <button class="btn btn-primary" id="emptyAdd">+ Aggiungi esercizio</button></div>`;
    $('exTabs').innerHTML = '';
    $('exNav').innerHTML = '';
    const b = $('emptyAdd'); if (b) b.onclick = () => openExerciseForm(null);
    return;
  }
  if (activeEx >= exs.length) activeEx = exs.length - 1;
  if (activeEx < 0) activeEx = 0;
  const session = lastSessionFor(day().name);
  $('exList').classList.add('tabs');
  $('exList').innerHTML = exs.map((ex, i) => cardHTML(ex, i, session, i === activeEx)).join('');
  renderExTabs();
  renderExNav();
}

/* ── schede degli esercizi: strip in alto + navigazione ── */
function renderExTabs() {
  const exs = day().exercises;
  $('exTabs').innerHTML = exs.map((ex, i) =>
    `<button class="ex-tab${i === activeEx ? ' active' : ''}${exDone(ex) ? ' done' : ''}" data-ex="${i}" data-testid="ex-tab-${i}">
      <span class="ex-tab-num">${exDone(ex) ? ICONS.check : (i + 1)}</span>
      <span class="ex-tab-name">${esc(ex.name)}</span></button>`
  ).join('');
}

function renderExNav() {
  const n = day().exercises.length;
  const last = activeEx >= n - 1;
  // sull'ultimo esercizio, se c'è progresso, il tasto destro chiude l'allenamento
  const right = (last && dayCounts().done > 0)
    ? `<button class="ex-nav-btn next fin" id="exFinish">Fine ✓</button>`
    : `<button class="ex-nav-btn next" id="exNext" ${last ? 'disabled' : ''}>Successivo ›</button>`;
  $('exNav').innerHTML = `<div class="ex-nav-inner">
    <button class="ex-nav-btn" id="exPrev" ${activeEx <= 0 ? 'disabled' : ''}>‹ Precedente</button>
    <span class="ex-nav-count">${activeEx + 1} / ${n}</span>
    ${right}
  </div>`;
  updateFabSave();
}

/* Il FAB "Fine" si mostra quando c'è progresso, ma non sull'ultimo esercizio:
   lì la stessa azione è già offerta come "Fine ✓" nella barra (niente doppioni). */
function updateFabSave() {
  const done = dayCounts().done;
  const n = day().exercises.length;
  const last = activeEx >= n - 1;
  $('fabSave').style.display = (done > 0 && !last) ? 'flex' : 'none';
}

/* Passa alla scheda dell'esercizio i senza ricostruire tutta la lista. */
function selectEx(i) {
  const exs = day().exercises;
  if (!exs.length) return;
  activeEx = Math.max(0, Math.min(exs.length - 1, i));
  [...$('exList').children].forEach((c, idx) => c.classList.toggle('active', idx === activeEx));
  [...$('exTabs').children].forEach((c, idx) => c.classList.toggle('active', idx === activeEx));
  renderExNav();
  const at = $('exTabs').children[activeEx];
  if (at) at.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Prossimo esercizio non ancora completato dopo "from" (-1 se non esiste). */
function nextIncompleteEx(from) {
  const exs = day().exercises;
  for (let n = 1; n <= exs.length; n++) {
    const k = (from + n) % exs.length;
    if (!exDone(exs[k])) return k;
  }
  return -1;
}

/* Navigazione tra le schede degli esercizi. */
$('exTabs').addEventListener('click', e => {
  const t = e.target.closest('.ex-tab');
  if (t) selectEx(+t.dataset.ex);
});
$('exNav').addEventListener('click', e => {
  if (e.target.closest('#exPrev')) selectEx(activeEx - 1);
  else if (e.target.closest('#exNext')) selectEx(activeEx + 1);
  else if (e.target.closest('#exFinish')) openFinishModal();
});

/* Mentre si digita in un campo serie la tastiera copre il fondo: nascondi la
   barra fissa. Piccolo debounce per non farla lampeggiare quando si passa da
   un campo all'altro. */
let kbTimer = null;
document.addEventListener('focusin', e => {
  if (e.target.classList && e.target.classList.contains('set-input')) {
    clearTimeout(kbTimer); document.body.classList.add('kb');
  }
});
document.addEventListener('focusout', e => {
  if (e.target.classList && e.target.classList.contains('set-input')) {
    clearTimeout(kbTimer);
    kbTimer = setTimeout(() => document.body.classList.remove('kb'), 150);
  }
});

/* ── serie: input e spunte ── */
$('exList').addEventListener('input', e => {
  const t = e.target;
  if (!t.classList.contains('set-input')) return;
  const ex = day().exercises[+t.dataset.ex];
  if (ex) { ex.log[+t.dataset.set][t.dataset.k] = t.value; save(); }
});

$('exList').addEventListener('click', e => {
  const opts = e.target.closest('.ex-opts-btn');
  if (opts) { openExMenu(+opts.dataset.exidx); return; }
  const chk = e.target.closest('.set-check');
  if (chk) toggleSet(+chk.dataset.ex, +chk.dataset.set, chk);
});

function toggleSet(i, j, btn) {
  const ex = day().exercises[i];
  const l = ex.log[j];
  l.done = !l.done;
  save();
  btn.classList.toggle('on', l.done);
  btn.closest('.set-row').classList.toggle('on', l.done);
  const card = btn.closest('.ex-card');
  card.classList.toggle('done', ex.log.every(x => x.done));
  renderDayHead();
  renderExTabs();
  renderExNav();
  if (l.done) {
    buzz(20);
    if (ex.restSec > 0) startRestTimer(ex.restSec, nextLabel(i, j));
    // esercizio completato: passa alla scheda del successivo ancora da fare
    if (exDone(ex)) {
      const nx = nextIncompleteEx(i);
      if (nx >= 0 && nx !== i) selectEx(nx);
    }
  }
}

function nextLabel(i, j) {
  const exs = day().exercises;
  const ex = exs[i];
  for (let k = 0; k < ex.sets; k++) if (!ex.log[k].done) return `Prossima: serie ${k + 1} di ${ex.sets} — ${ex.name}`;
  for (let n = 1; n <= exs.length; n++) {
    const e2 = exs[(i + n) % exs.length];
    if (e2.log.some(l => !l.done)) return `Prossimo esercizio: ${e2.name}`;
  }
  return 'Giornata completata! 🎉';
}

/* ── timer di recupero ── */
const T = { remain: 0, total: 90, running: false, last: 0, iv: null };

/* Suono: la vibrazione non funziona su iOS, quindi a fine recupero suona un beep.
   Il contesto audio va creato/ripreso durante un tocco (spunta serie): lo facciamo
   all'avvio del timer, così il beep finale può suonare senza altro gesto. */
let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (_) {}
}
function beep() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    [0, 0.18, 0.36].forEach((t, k) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = k === 2 ? 1320 : 880;
      g.gain.setValueAtTime(0.0001, now + t);
      g.gain.exponentialRampToValueAtTime(0.35, now + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.15);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now + t); o.stop(now + t + 0.16);
    });
  } catch (_) {}
}

/* Wake Lock: tiene acceso lo schermo durante il recupero (dove supportato). */
let wakeLock = null;
async function acquireWake() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
}
function releaseWake() { try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (_) {} }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && T.running && $('timerOverlay').classList.contains('open')) acquireWake();
});

function startRestTimer(sec, next) {
  T.remain = sec; T.total = sec; T.running = true; T.last = Date.now();
  $('timerNext').textContent = next || '';
  $('timerPause').textContent = 'Pausa';
  $('timerOverlay').classList.add('open');
  ensureAudio();
  acquireWake();
  clearInterval(T.iv);
  T.iv = setInterval(tickTimer, 200);
  paintTimer();
}
function tickTimer() {
  const now = Date.now();
  if (T.running) T.remain -= (now - T.last) / 1000;
  T.last = now;
  if (T.remain <= 0) {
    stopTimer();
    beep();
    buzz([200, 100, 200]);
    toast('Recupero completato 💪');
    return;
  }
  paintTimer();
}
function paintTimer() {
  $('timerText').textContent = Math.ceil(Math.max(0, T.remain));
  const C = 339.29;
  $('timerArc').style.strokeDashoffset = C * (1 - Math.max(0, T.remain) / Math.max(1, T.total));
}
function stopTimer() { clearInterval(T.iv); T.iv = null; T.running = false; $('timerOverlay').classList.remove('open'); releaseWake(); }
$('timerSkip').onclick = stopTimer;
$('timerMinus').onclick = () => { T.remain = Math.max(0.5, T.remain - 15); paintTimer(); };
$('timerPlus').onclick = () => { T.remain += 15; T.total = Math.max(T.total, T.remain); paintTimer(); };
$('timerPause').onclick = function () { T.running = !T.running; T.last = Date.now(); this.textContent = T.running ? 'Pausa' : 'Riprendi'; };

/* ── riordino: pressione prolungata + vibrazione (unico modo per spostare) ── */
const HOLD_MS = 350, MOVE_TOL = 10;
let drag = null;

document.addEventListener('touchmove', e => { if (drag && drag.armed) e.preventDefault(); }, { passive: false });
document.addEventListener('contextmenu', e => { if (drag) e.preventDefault(); });

$('exList').addEventListener('pointerdown', e => {
  if (drag || e.button > 0) return;
  const card = e.target.closest('.ex-card');
  if (!card || e.target.closest('button, input, select, textarea, a')) return;
  drag = {
    card, ph: null,
    startX: e.clientX, startY: e.clientY, lastY: e.clientY,
    offsetY: 0, armed: false, raf: null,
    timer: setTimeout(armDrag, HOLD_MS)
  };
  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup', dragEnd);
  document.addEventListener('pointercancel', dragEnd);
});

/* ── swipe orizzontale sulla card: cambia esercizio. Non intralcia il riordino,
      che richiede pressione prolungata (350 ms) + trascinamento verticale. ── */
let swipe = null;
$('exList').addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse' || e.button > 0) return;     // solo tocco/penna
  if (e.target.closest('button, input, select, textarea, a')) return;
  swipe = { x: e.clientX, y: e.clientY, t: Date.now(), id: e.pointerId };
});
$('exList').addEventListener('pointerup', e => {
  const s = swipe; swipe = null;
  if (!s || e.pointerId !== s.id) return;
  if (drag && drag.armed) return;                            // stavo riordinando
  const dx = e.clientX - s.x, dy = e.clientY - s.y;
  if (Date.now() - s.t < 500 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.8) {
    selectEx(activeEx + (dx < 0 ? 1 : -1));                   // ← successivo · → precedente
  }
});

function armDrag() {
  if (!drag) return;
  const { card } = drag;
  buzz(35);                                     // la finestra "vibra": da ora si può spostare
  drag.armed = true;
  // tutte le finestre si riducono al solo titolo per rilasciare più comodamente
  $('exList').classList.add('compact');
  // dopo la compattazione riporta la card sotto il dito
  let r = card.getBoundingClientRect();
  window.scrollBy(0, (r.top + r.height / 2) - drag.startY);
  r = card.getBoundingClientRect();
  drag.offsetY = Math.max(8, Math.min(r.height - 8, drag.startY - r.top));
  drag.ph = document.createElement('div');
  drag.ph.className = 'drag-ph';
  drag.ph.style.height = r.height + 'px';
  card.parentNode.insertBefore(drag.ph, card);
  card.classList.add('dragging');
  card.style.position = 'fixed';
  card.style.left = r.left + 'px';
  card.style.top = (drag.startY - drag.offsetY) + 'px';
  card.style.width = r.width + 'px';
  document.body.classList.add('dragging-active');
  drag.raf = requestAnimationFrame(dragLoop);
}

function dragMove(e) {
  if (!drag) return;
  if (!drag.armed) {
    if (Math.abs(e.clientY - drag.startY) > MOVE_TOL || Math.abs(e.clientX - drag.startX) > MOVE_TOL) cancelDrag();
    return;
  }
  e.preventDefault();
  drag.lastY = e.clientY;
}

function dragLoop() {
  if (!drag || !drag.armed) return;
  const y = drag.lastY;
  drag.card.style.top = (y - drag.offsetY) + 'px';
  // autoscroll ai bordi
  const M = 90;
  if (y < M) window.scrollBy(0, -Math.ceil((M - y) / 6));
  else if (y > innerHeight - M) window.scrollBy(0, Math.ceil((y - (innerHeight - M)) / 6));
  // sposta il segnaposto sopra o sotto le altre finestre
  const others = [...$('exList').querySelectorAll('.ex-card:not(.dragging)')];
  let before = null;
  for (const c of others) {
    const r = c.getBoundingClientRect();
    if (y < r.top + r.height / 2) { before = c; break; }
  }
  if (before) { if (drag.ph.nextElementSibling !== before) $('exList').insertBefore(drag.ph, before); }
  else if ($('exList').lastElementChild !== drag.ph) $('exList').appendChild(drag.ph);
  drag.raf = requestAnimationFrame(dragLoop);
}

function dragEnd() {
  if (!drag) return;
  if (drag.armed) {
    const { card, ph } = drag;
    $('exList').insertBefore(card, ph);
    ph.remove();
    card.classList.remove('dragging');
    card.style.position = card.style.left = card.style.top = card.style.width = '';
    document.body.classList.remove('dragging-active');
    $('exList').classList.remove('compact');
    const order = [...$('exList').querySelectorAll('.ex-card')].map(c => +c.dataset.exidx);
    const exs = day().exercises;
    day().exercises = order.map(i => exs[i]);
    // mantieni attiva la scheda che stavi spostando
    const newActive = order.indexOf(activeEx);
    if (newActive >= 0) activeEx = newActive;
    save();
    buzz(15);
    renderList();
    renderDayHead();
  }
  cancelDrag();
}

function cancelDrag() {
  if (!drag) return;
  clearTimeout(drag.timer);
  cancelAnimationFrame(drag.raf);
  if (drag.armed) {
    drag.ph && drag.ph.remove();
    drag.card.classList.remove('dragging');
    drag.card.style.position = drag.card.style.left = drag.card.style.top = drag.card.style.width = '';
    document.body.classList.remove('dragging-active');
    $('exList').classList.remove('compact');
  }
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup', dragEnd);
  document.removeEventListener('pointercancel', dragEnd);
  drag = null;
}

/* ── giorni ── */
$('dayBar').addEventListener('click', e => {
  const add = e.target.closest('.add-day');
  if (add) {
    state.days.push({ name: 'Giorno ' + String.fromCharCode(65 + state.days.length), exercises: [] });
    state.activeDay = state.days.length - 1;
    activeEx = 0;
    save(); render();
    return;
  }
  const tab = e.target.closest('.day-tab[data-day]');
  if (tab) { state.activeDay = +tab.dataset.day; activeEx = 0; save(); render(); }
});

/* ── modali ── */
function openModal(title, bodyHTML) {
  const m = $('modal');
  m.innerHTML = `<div class="modal-head"><h3>${esc(title)}</h3>
    <button class="icon-btn" id="modalClose">${ICONS.close}</button></div>
    <div class="modal-body">${bodyHTML}</div>`;
  $('overlay').classList.add('open');
  $('modalClose').onclick = closeModal;
  return m.querySelector('.modal-body');
}
function closeModal() { $('overlay').classList.remove('open'); }
$('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeModal(); });
$('modal').setAttribute('role', 'dialog');
$('modal').setAttribute('aria-modal', 'true');
// Esc: chiude prima il timer di recupero, poi un'eventuale finestra aperta
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if ($('timerOverlay').classList.contains('open')) { stopTimer(); return; }
  if ($('overlay').classList.contains('open')) closeModal();
});

function confirmModal(title, text, label, cb) {
  const b = openModal(title, `<p style="color:var(--muted);font-size:14px;margin-bottom:18px">${esc(text)}</p>
    <div class="modal-foot"><button class="btn btn-ghost btn-block" id="cfNo">Annulla</button>
    <button class="btn btn-danger btn-block" id="cfYes">${esc(label)}</button></div>`);
  b.querySelector('#cfNo').onclick = closeModal;
  b.querySelector('#cfYes').onclick = () => { closeModal(); cb(); };
}

/* ── form esercizio (aggiungi / modifica) ── */
function openExerciseForm(idx) {
  const ex = idx == null ? { name: '', sets: 3, reps: '8-12', weight: '', restSec: 90, note: '' } : day().exercises[idx];
  const b = openModal(idx == null ? 'Nuovo esercizio' : 'Modifica esercizio', `
    ${idx == null ? `<div class="field"><label>Giorno</label><select id="fDay">${state.days.map((d, di) => `<option value="${di}"${di === state.activeDay ? ' selected' : ''}>${esc(d.name)}</option>`).join('')}</select></div>` : ''}
    <div class="field"><label>Nome esercizio</label><input id="fName" type="text" placeholder="Es. Panca piana" value="${esc(ex.name)}"></div>
    <div class="grid3">
      <div class="field"><label>Serie</label><input id="fSets" type="number" min="1" max="20" inputmode="numeric" value="${ex.sets}"></div>
      <div class="field"><label>Ripetizioni</label><input id="fReps" type="text" placeholder="8-12 / 45s" value="${esc(ex.reps)}"></div>
      <div class="field"><label>Peso (kg)</label><input id="fWeight" type="text" inputmode="decimal" placeholder="—" value="${ex.weight != null ? esc(ex.weight) : ''}"></div>
    </div>
    <div class="field"><label>Recupero (secondi)</label><input id="fRest" type="number" min="0" max="900" inputmode="numeric" placeholder="90" value="${ex.restSec}"></div>
    <div class="field"><label>Note (facoltative)</label><textarea id="fNote" placeholder="Es. controlla la discesa">${esc(ex.note)}</textarea></div>
    <div class="modal-foot"><button class="btn btn-primary btn-block" id="fSave">Salva</button></div>`);
  const nameInput = b.querySelector('#fName');
  b.querySelector('#fSave').onclick = () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); nameInput.style.borderColor = 'var(--coral)'; return; }
    const w = b.querySelector('#fWeight').value.trim().replace(',', '.');
    const data = {
      name,
      sets: Math.min(20, Math.max(1, parseInt(b.querySelector('#fSets').value, 10) || 3)),
      reps: b.querySelector('#fReps').value.trim() || '8-12',
      weight: w === '' || isNaN(parseFloat(w)) ? null : parseFloat(w),
      restSec: Math.max(0, Math.min(900, parseInt(b.querySelector('#fRest').value, 10) || 0)),
      note: b.querySelector('#fNote').value.trim()
    };
    let addedToOther = false;
    if (idx == null) {
      const sel = b.querySelector('#fDay');
      const di = sel ? Math.max(0, Math.min(state.days.length - 1, +sel.value)) : state.activeDay;
      addedToOther = di !== state.activeDay;
      state.days[di].exercises.push(ensureLog(data));
      state.activeDay = di;                        // mostra il giorno scelto
      activeEx = state.days[di].exercises.length - 1;
    } else { Object.assign(day().exercises[idx], data); ensureLog(day().exercises[idx]); activeEx = idx; }
    save(); closeModal(); render();
    toast(idx == null ? (addedToOther ? `Esercizio aggiunto a "${day().name}"` : 'Esercizio aggiunto') : 'Esercizio aggiornato');
  };
  if (idx == null) setTimeout(() => nameInput.focus(), 250);
}

/* ── menu opzioni esercizio ── */
function moveExercise(i, dir) {
  const exs = day().exercises;

  [exs[i], exs[j]] = [exs[j], exs[i]];
  activeEx = j;
  save(); closeModal(); render(); buzz(15);
  toast(dir < 0 ? 'Spostato su' : 'Spostato giù');
}
function openExMenu(i) {

function saveSession(clearAfter) {
  const d = day();
  const rec = {
    ts: Date.now(),
    exercises: d.exercises.map(e => ({
      name: e.name,
      sets: e.log.map(l => ({ reps: l.reps, weight: l.weight, done: !!l.done }))
    }))
  };
  const arr = state.history[d.name] || (state.history[d.name] = []);
  arr.push(rec);
  if (arr.length > 20) arr.splice(0, arr.length - 20);
  if (clearAfter) d.exercises.forEach(ex => ex.log.forEach(l => { l.done = false; l.reps = ''; l.weight = ''; }));
  save(); render();
  toast(clearAfter ? 'Sessione salvata, scheda pronta 💪' : 'Sessione salvata');
}

function openCompare() {
  const last = lastSessionFor(day().name);
  if (!last) { toast('Nessuna sessione salvata per questo giorno'); return; }
  const fmtSet = s => !s || (!s.reps && !s.weight) ? (s && s.done ? '✓' : '—')
    : `${s.reps || '—'}${s.weight ? ` × ${s.weight}` : ''}`;
  const blocks = day().exercises.map(ex => {
    const prevEx = prevExercise(last, ex.name);
    if (!prevEx) return '';
    const rows = ex.log.map((l, j) => {
      const ps = prevEx.sets[j];
      const today = { reps: l.reps, weight: l.weight, done: l.done };
      // confronto: prima il peso, a parità le ripetizioni
      const dw = firstNum(today.weight) != null && ps && firstNum(ps.weight) != null ? firstNum(today.weight) - firstNum(ps.weight) : null;
      const dr = firstNum(today.reps) != null && ps && firstNum(ps.reps) != null ? firstNum(today.reps) - firstNum(ps.reps) : null;
      const diff = dw !== null && dw !== 0 ? dw : (dr !== null ? dr : (dw !== null ? 0 : null));
      const arrow = diff == null ? '<span class="arrow eq">·</span>'
        : diff > 0 ? '<span class="arrow up">▲</span>'
        : diff < 0 ? '<span class="arrow down">▼</span>'
        : '<span class="arrow eq">=</span>';
      return `<div class="cmp-row"><div class="n">${j + 1}</div><div class="v prev">${esc(fmtSet(ps))}</div>${arrow}<div class="v">${esc(fmtSet(today))}</div></div>`;
    }).join('');
    return `<div class="cmp-ex"><h4>${esc(ex.name)}</h4>
      <div class="cmp-head"><span></span><span style="text-align:center">${esc(fmtDateTs(last.ts))}</span><span></span><span style="text-align:center">Oggi</span></div>${rows}</div>`;
  }).join('');
  openModal('Confronto con l\'ultima volta', blocks ||
    '<p style="color:var(--muted);font-size:14px">Nessun esercizio di oggi compare nella sessione salvata.</p>');
}

    const name = day().name;

    state.activeDay = Math.max(0, state.activeDay - 1);
    save(); render(); toast('Giorno eliminato');

$('btnImport').onclick = openImport;

function openImport() {
  const b = openModal('Importa scheda JSON', `

    </div>

    <button class="btn btn-ghost btn-block" id="pasteClip" style="margin-bottom:10px">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>
      Incolla dagli appunti
    </button>
    <textarea id="pasteJson" class="paste-json" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder='Incolla qui tutto il testo JSON…&#10;{"programName":"…","days":[…]}'></textarea>
    <button class="btn btn-primary btn-block" id="pasteLoad" style="margin-top:10px">Carica dal testo incollato</button>
    <div class="hint">Comodo da telefono: se la tua AI ti ha dato solo il <b>testo</b> (non un file), incollalo qui. Poi potrai scegliere se <b>sostituire</b> la scheda o <b>aggiungere</b> i giorni. Formato: <code>{"programName":"…","days":[{"name":"…","exercises":[…]}]}</code> — scarica le istruzioni per l'AI dal menu per il formato completo. Puoi caricare qui anche un <b>backup completo</b> esportato da FORGE (riconosciuto in automatico).</div>`);
  const dz = b.querySelector('#dz');
  dz.onclick = () => $('fileInput').click();
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag'); };
  dz.ondragleave = () => dz.classList.remove('drag');
  dz.ondrop = e => {
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) readImportFile(f);
  };
  b.querySelector('#pasteLoad').onclick = () => {
    const txt = b.querySelector('#pasteJson').value;
    if (!txt.trim()) { toast('Incolla prima il testo JSON'); return; }
    tryImportText(txt);
  };
  const clipBtn = b.querySelector('#pasteClip');
  if (navigator.clipboard && navigator.clipboard.readText) {
    clipBtn.onclick = async () => {
      let txt;
      try {
        txt = await navigator.clipboard.readText();
      } catch (_) {
        b.querySelector('#pasteJson').focus();
        toast('Permesso appunti negato: incolla nel riquadro');
        return;
      }
      if (!txt || !txt.trim()) { toast('Gli appunti sono vuoti'); return; }
      b.querySelector('#pasteJson').value = txt;
      tryImportText(txt);
    };
  } else {
    clipBtn.style.display = 'none'; // browser senza accesso agli appunti (es. Firefox)
  }
}
$('fileInput').addEventListener('change', function () {
  if (this.files && this.files[0]) readImportFile(this.files[0]);
  this.value = '';
});
function readImportFile(file) {
  const r = new FileReader();
  r.onload = () => tryImportText(r.result);
  r.onerror = () => toast('Import fallito: impossibile leggere il file');
  r.readAsText(file);
}

/* Ripulisce il testo incollato: toglie spazi e gli eventuali recinti
   markdown ```json … ``` che le AI aggiungono spesso. */
function cleanJsonText(t) {
  return String(t == null ? '' : t)
    .replace(/^﻿/, '')
    .trim()
    .replace(/^```(?:json)?[ \t]*\r?\n?/i, '')
    .replace(/\r?\n?```$/, '')
    .trim();
}

/* Valida un testo JSON (da file o incollato) e apre la scelta di caricamento. */
function tryImportText(text) {
  const src = cleanJsonText(text);
  if (!src) { toast('Import fallito: testo vuoto'); return; }
  let obj;
  try {
    obj = JSON.parse(src);
  } catch (err) {
    toast('JSON non valido: ' + err.message);
    return;
  }
  // backup completo dell'app (scheda + storico + misure): ripristino diretto
  if (obj && obj.__forgeBackup && obj.state) { openBackupRestore(obj.state); return; }
  let parsed;
  try {
    parsed = parseProgram(obj);
  } catch (err) {
    toast('JSON non valido: ' + err.message);
    return;
  }
  openImportChoice(parsed);
}

/* Ripristina un backup completo (scheda + storico + misure), previa conferma. */
function openBackupRestore(raw) {
  let restored;
  try { restored = normalizeState(JSON.parse(JSON.stringify(raw))); }
  catch (_) { toast('Backup non valido'); return; }
  const nd = restored.days.length, nm = restored.measurements.length;
  confirmModal('Ripristina backup',
    `Ripristinare il backup completo? Sostituirà scheda, storico e misure attuali (${nd} ${nd === 1 ? 'giorno' : 'giorni'}, ${nm} ${nm === 1 ? 'misurazione' : 'misurazioni'}).`,
    'Ripristina', () => {
      state = restored; state.exportSig = null;
      save(); render(); renderProgress();
      toast('Backup ripristinato ✔');
    });
}

/* Chiede come applicare la scheda caricata: sostituire o aggiungere i giorni. */
function openImportChoice(parsed) {
  const n = parsed.days.length;
  const names = parsed.days.map(d => d.name).join(' · ');
  const dayWord = n === 1 ? '1 giorno' : `${n} giorni`;
  const b = openModal('Come vuoi caricarla?', `
    <div class="import-summary">
      <div class="is-name">${esc(parsed.programName)}</div>
      <div class="is-days">${esc(dayWord)}: ${esc(names)}</div>
    </div>
    <div class="import-choices">
      <button class="ic-opt" id="icReplace">
        <div class="ic-ic">${ICONS.replace}</div>
        <div class="ic-tx"><strong>Sostituisci l'intera scheda</strong><span>Rimuove i giorni attuali e carica questa scheda al loro posto</span></div>
      </button>
      <button class="ic-opt" id="icAppend">
        <div class="ic-ic">${ICONS.append}</div>
        <div class="ic-tx"><strong>Aggiungi ${n === 1 ? 'il giorno' : 'i ' + n + ' giorni'}</strong><span>Mantiene la scheda attuale e accoda ${n === 1 ? 'il nuovo giorno' : 'i nuovi giorni'}</span></div>
      </button>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-block" id="icCancel">Annulla</button></div>`);
  b.querySelector('#icCancel').onclick = closeModal;
  b.querySelector('#icAppend').onclick = () => {
    applyImportAppend(parsed); closeModal(); render();
    toast(n === 1 ? 'Giorno aggiunto ✔' : `${n} giorni aggiunti ✔`);
  };
  b.querySelector('#icReplace').onclick = () => confirmOverwrite(parsed);
}

/* Prima di sovrascrivere, offre di salvare un backup della scheda attuale
   (solo se non è già stata esportata così com'è). */
function confirmOverwrite(parsed) {
  const doReplace = () => {
    applyImportReplace(parsed); closeModal(); render();
    toast('Scheda sostituita ✔');
  };
  if (isScheduleSaved()) { doReplace(); return; }
  const b = openModal('Salvare la scheda attuale?', `
    <p class="modal-text">La scheda attuale verrà sovrascritta e i suoi dati andranno persi. Vuoi scaricarne prima una copia di backup (file JSON)?</p>
    <div class="modal-foot stack">
      <button class="btn btn-primary btn-block" id="ovBackup">Scarica backup e sostituisci</button>
      <button class="btn btn-danger btn-block" id="ovNo">Sostituisci senza salvare</button>
      <button class="btn btn-ghost btn-block" id="ovCancel">Annulla</button>
    </div>`);
  b.querySelector('#ovCancel').onclick = closeModal;
  b.querySelector('#ovNo').onclick = doReplace;
  b.querySelector('#ovBackup').onclick = () => { exportJSON(); doReplace(); };
}

/* Firma della scheda: serve a capire se è già stata salvata/esportata così com'è. */
function scheduleSig() {
  return JSON.stringify({
    programName: state.programName,
    days: state.days.map(d => ({
      name: d.name,
      exercises: d.exercises.map(e => ({ name: e.name, sets: e.sets, reps: e.reps, weight: e.weight, restSec: e.restSec, note: e.note }))
    }))
  });
}
function isScheduleSaved() { return !!state.exportSig && state.exportSig === scheduleSig(); }

/* Sostituisce l'intera scheda con quella caricata (lo storico sopravvive). */
function applyImportReplace(parsed) {
  state = normalizeState({
    programName: parsed.programName,
    activeDay: 0,
    days: parsed.days,
    history: state.history,
    measurements: state.measurements   // le misure corporee non c'entrano con la scheda: conservale
  });
  state.exportSig = null; // nuova scheda: non ancora salvata
  save();
}

/* Accoda i giorni caricati alla scheda attuale, evitando nomi duplicati. */
function applyImportAppend(parsed) {
  const names = new Set(state.days.map(d => d.name));
  const firstNew = state.days.length;
  parsed.days.forEach(d => {
    let name = d.name, k = 2;
    while (names.has(name)) name = `${d.name} (${k++})`;
    names.add(name);
    state.days.push({ name, exercises: d.exercises });
  });
  state.activeDay = firstNew; // mostra il primo giorno appena aggiunto
  state.exportSig = null;     // la scheda è cambiata
  state = normalizeState(state);
  save();
}

/* Valida il JSON caricato e restituisce { programName, days } senza toccare lo stato. */
function parseProgram(obj) {
  if (!obj || typeof obj !== 'object') throw new Error('il file non contiene un oggetto JSON');
  const days = obj.days || obj.giorni;
  if (!Array.isArray(days) || !days.length) throw new Error('manca l\'elenco "days" con almeno un giorno');
  const outDays = days.map((d, di) => {
    if (!d || typeof d !== 'object') throw new Error(`giorno ${di + 1} non valido`);
    const exsIn = d.exercises || d.esercizi || [];
    if (!Array.isArray(exsIn)) throw new Error(`"exercises" del giorno ${di + 1} deve essere una lista`);
    const exercises = exsIn.map((e, ei) => {
      if (!e || typeof e !== 'object') throw new Error(`esercizio ${ei + 1} del giorno ${di + 1} non valido`);
      const name = String(e.name || e.nome || e.esercizio || '').trim();
      if (!name) throw new Error(`esercizio ${ei + 1} del giorno ${di + 1}: manca il nome`);
      let sets = parseInt(e.sets != null ? e.sets : e.serie, 10);
      if (isNaN(sets)) sets = 3;
      sets = Math.min(20, Math.max(1, sets));
      let weight = e.weight != null ? e.weight : e.peso;
      if (weight === '' || weight == null) weight = null;
      else { weight = parseFloat(String(weight).replace(',', '.')); if (isNaN(weight)) weight = null; }
      const restRaw = e.restSec != null ? e.restSec : (e.rest != null ? e.rest : e.recupero);
      return ensureLog({
        name,
        sets,
        reps: String(e.reps != null ? e.reps : (e.ripetizioni != null ? e.ripetizioni : '8-12')).trim() || '8-12',
        weight,
        restSec: restRaw == null ? 90 : parseRest(restRaw),
        note: String(e.note != null ? e.note : (e.nota != null ? e.nota : '')).trim()
      });
    });
    return { name: String(d.name || d.nome || `Giorno ${String.fromCharCode(65 + di)}`).trim() || `Giorno ${di + 1}`, exercises };
  });
  return {
    programName: String(obj.programName || obj.program || obj.nome || 'Il mio programma').trim() || 'Il mio programma',
    days: outDays
  };
}

function exportJSON() {
  const out = {
    programName: state.programName,
    days: state.days.map(d => ({
      name: d.name,
      exercises: d.exercises.map(e => ({ name: e.name, sets: e.sets, reps: e.reps, weight: e.weight, restSec: e.restSec, note: e.note }))
    }))
  };
  downloadText('forge-scheda.json', JSON.stringify(out, null, 2), 'application/json');
  state.exportSig = scheduleSig(); // ricorda che la scheda è stata salvata
  save();
  toast('Scheda esportata');
}

/* Backup completo: tutto lo stato (scheda + storico sessioni + misure).
   Re-importabile dalla stessa schermata di import (riconosciuto in automatico). */
function exportBackup() {
  const out = { __forgeBackup: 1, exportedAt: new Date().toISOString(), state };
  downloadText('forge-backup-completo.json', JSON.stringify(out), 'application/json');
  toast('Backup completo esportato');
}

================================================================

Devi produrre UN SOLO file JSON (estensione .json, codifica UTF-8) che

CAMPI

Per ogni giorno:

Per ogni esercizio:

days=giorni · name=nome · exercises=esercizi · name(esercizio)=nome/esercizio

REGOLE
------
1. JSON valido: virgole giuste, stringhe tra doppi apici, niente commenti.
2. Numeri con il punto decimale (22.5, non 22,5).
3. L'ordine degli esercizi nella lista è l'ordine mostrato nell'app.
4. Non inventare campi extra: quelli sconosciuti vengono ignorati.
5. L'import SOSTITUISCE tutta la scheda esistente. Lo storico delle

ESEMPIO COMPLETO (2 giorni)

/* ═══════════════ PROGRESSI — peso & misure ═══════════════ */
const MEAS_FIELDS = [
  { key: 'weight',  label: 'Peso',         unit: 'kg' },
  { key: 'bodyFat', label: 'Massa grassa', unit: '%'  },
  { key: 'neck',    label: 'Collo',        unit: 'cm' },
  { key: 'chest',   label: 'Petto',        unit: 'cm' },
  { key: 'waist',   label: 'Vita',         unit: 'cm' },
  { key: 'hips',    label: 'Fianchi',      unit: 'cm' },
  { key: 'arm',     label: 'Braccio',      unit: 'cm' },
  { key: 'thigh',   label: 'Coscia',       unit: 'cm' },
  { key: 'calf',    label: 'Polpaccio',    unit: 'cm' }
];
const MEAS_LABEL = k => (MEAS_FIELDS.find(f => f.key === k) || {}).label || k;
const MEAS_UNIT  = k => (MEAS_FIELDS.find(f => f.key === k) || {}).unit || '';

const measList = () => state.measurements;
const sortedMeas = () => measList().slice().sort((a, b) =>
  a.date < b.date ? -1 : a.date > b.date ? 1 : (a.id < b.id ? -1 : 1)); // cronologico crescente

function fmtNum(n) { if (n == null || isNaN(n)) return '—'; return (Math.round(n * 10) / 10).toString().replace('.', ','); }
function fmtDateISO(iso) { const p = String(iso).split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0].slice(2)}` : String(iso); }
function todayISO() { const d = new Date(), p = n => String(n).padStart(2, '0'); return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`; }

/* Δ di list[idx] rispetto al precedente valore non vuoto della stessa misura. */
function prevValue(list, idx, key) {
  for (let i = idx - 1; i >= 0; i--) { const v = list[i].values[key]; if (v != null && !isNaN(v)) return v; }
  return null;
}
function deltaHTML(list, idx, key) {
  const cur = list[idx].values[key];
  if (cur == null || isNaN(cur)) return '';
  const pv = prevValue(list, idx, key);
  if (pv == null) return '';
  const d = Math.round((cur - pv) * 10) / 10;
  if (d === 0) return `<span class="dl eq">±0</span>`;
  return `<span class="dl">${d > 0 ? '▲' : '▼'} ${fmtNum(Math.abs(d))}</span>`;
}

/* ── navigazione tra le viste ── */
function setView(v) {
  document.body.setAttribute('data-view', v);
  if (v === 'training') render();
  if (v === 'progress') renderProgress();
  window.scrollTo(0, 0);
}

function renderProgress() {
  const main = $('progressMain');

    main.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"></path><path d="M15 7h6v6"></path></svg>
      <h3>Inizia a monitorare</h3>

    </div>`;

    return;
  }
  const i = list.length - 1;

    `<div class="prog-chip"><div class="pc-l">${esc(MEAS_LABEL(k))}</div><div class="pc-v">${fmtNum(latest.values[k])}<span class="unit">${MEAS_UNIT(k)}</span>${deltaHTML(list, i, k)}</div></div>`).join('');
  const hero = `<div class="prog-hero">

    <div class="ph-weight">${w != null ? `<span class="val">${fmtNum(w)}</span><span class="u">kg</span> ${deltaHTML(list, i, 'weight')}` : `<span class="u">Nessun peso in questa rilevazione</span>`}</div>
    ${chips ? `<div class="prog-chips">${chips}</div>` : ''}

    `<div class="hint" style="margin-top:14px">Tocca una data nella tabella per modificare o eliminare quella rilevazione. Le variazioni (▲▼) sono rispetto alla misura precedente.</div>`;
  main.querySelectorAll('th[data-mid]').forEach(el => el.onclick = () => openMeasurementForm(el.dataset.mid));
}

/* Andamento del peso nel tempo: line chart (una sola serie, colore volt). */
function weightChart(list) {
  const pts = list.filter(e => e.values.weight != null && !isNaN(e.values.weight))
                  .map(e => ({ date: e.date, w: e.values.weight }));
  if (pts.length < 2) return '';
  const W = 320, H = 150, L = 30, R = 12, TOP = 14, BOT = 24;
  const plotW = W - L - R, plotH = H - TOP - BOT, baseY = TOP + plotH;
  let min = Math.min(...pts.map(p => p.w)), max = Math.max(...pts.map(p => p.w));
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.12; min -= pad; max += pad;
  const X = i => L + (i / (pts.length - 1)) * plotW;
  const Y = w => TOP + (1 - (w - min) / (max - min)) * plotH;
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)} ${Y(p.w).toFixed(1)}`).join(' ');
  const area = `${line} L${X(pts.length - 1).toFixed(1)} ${baseY} L${X(0).toFixed(1)} ${baseY} Z`;
  const first = pts[0], last = pts[pts.length - 1];
  const dots = pts.map((p, i) =>
    `<circle cx="${X(i).toFixed(1)}" cy="${Y(p.w).toFixed(1)}" r="2.3" fill="#0A0A0F" stroke="#C6FF3D" stroke-width="1.5"><title>${esc(fmtDateISO(p.date))}: ${fmtNum(p.w)} kg</title></circle>`).join('');
  const delta = Math.round((last.w - first.w) * 10) / 10;
  const dTxt = delta === 0 ? '±0 kg' : `${delta > 0 ? '▲' : '▼'} ${fmtNum(Math.abs(delta))} kg`;
  const dCol = delta === 0 ? 'var(--muted)' : (delta > 0 ? 'var(--amber)' : 'var(--volt)');
  return `<div class="prog-sec-title">Andamento peso</div>
  <div class="wchart">
    <div class="wc-cap"><span class="t">${pts.length} rilevazioni con peso</span><span class="d" style="color:${dCol}">${dTxt} <span style="color:var(--muted);font-weight:600;font-size:11px">dal primo</span></span></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Andamento del peso corporeo nel tempo">
      <defs><linearGradient id="wcg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#C6FF3D" stop-opacity="0.20"></stop>
        <stop offset="1" stop-color="#C6FF3D" stop-opacity="0"></stop>
      </linearGradient></defs>
      <line x1="${L}" y1="${TOP}" x2="${W - R}" y2="${TOP}" stroke="#2A2A3A" stroke-width="1"></line>
      <line x1="${L}" y1="${baseY}" x2="${W - R}" y2="${baseY}" stroke="#2A2A3A" stroke-width="1"></line>
      <path d="${area}" fill="url(#wcg)"></path>
      <path d="${line}" fill="none" stroke="#C6FF3D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
      ${dots}
      <circle cx="${X(pts.length - 1).toFixed(1)}" cy="${Y(last.w).toFixed(1)}" r="3.8" fill="#C6FF3D" stroke="#15151F" stroke-width="2"></circle>
      <text x="${L - 4}" y="${TOP + 3}" fill="#8A8A9A" font-size="9" font-weight="700" text-anchor="end">${fmtNum(max)}</text>
      <text x="${L - 4}" y="${baseY + 3}" fill="#8A8A9A" font-size="9" font-weight="700" text-anchor="end">${fmtNum(min)}</text>
      <text x="${L}" y="${H - 5}" fill="#8A8A9A" font-size="9.5" font-weight="700">${esc(fmtDateISO(first.date))}</text>
      <text x="${W - R}" y="${H - 5}" fill="#8A8A9A" font-size="9.5" font-weight="700" text-anchor="end">${esc(fmtDateISO(last.date))}</text>
    </svg>
  </div>`;
}

function buildMeasTable(list) {
  const cols = list.slice().reverse(); // più recente a sinistra
  const fields = MEAS_FIELDS.filter(f => list.some(e => e.values[f.key] != null && !isNaN(e.values[f.key])));
  if (!fields.length) return '';
  const head = `<thead><tr><th class="metric">Misura</th>${cols.map((e, ci) =>
    `<th class="${ci === 0 ? 'latest' : ''}" data-mid="${esc(e.id)}">${esc(fmtDateISO(e.date))}</th>`).join('')}</tr></thead>`;
  const body = fields.map(f => {
    const cells = cols.map((e, ci) => {
      const idxAsc = list.length - 1 - ci;
      const v = e.values[f.key];
      const cell = (v == null || isNaN(v))
        ? `<span class="cv" style="color:var(--muted)">—</span>`
        : `<span class="cv">${fmtNum(v)}</span>${deltaHTML(list, idxAsc, f.key)}`;
      return `<td class="${ci === 0 ? 'latest' : ''}">${cell}</td>`;
    }).join('');
    return `<tr><th class="metric">${esc(f.label)} <span class="unit">${f.unit}</span></th>${cells}</tr>`;
  }).join('');
  return `<div class="cmp2-wrap"><table class="cmp2">${head}<tbody>${body}</tbody></table></div>`;
}

function openMeasurementForm(id) {
  const editing = id ? measList().find(m => m.id === id) : null;
  const v = editing ? editing.values : {};
  const grid = MEAS_FIELDS.map(f => `
    <div class="field">
