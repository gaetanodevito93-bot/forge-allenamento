      <input type="number" inputmode="decimal" step="0.1" min="0" id="mf_${f.key}" value="${v[f.key] != null ? String(v[f.key]) : ''}" placeholder="—">
    </div>`).join('');
  const b = openModal(editing ? 'Modifica misurazione' : 'Nuova misurazione', `
    <div class="field"><label>Data</label><input type="date" id="mf_date" value="${esc(editing ? editing.date : todayISO())}" max="${todayISO()}"></div>
    <div class="meas-grid">${grid}</div>
    <div class="field"><label>Note</label><textarea id="mf_note" placeholder="Es. a digiuno, fase di scarico…">${esc(editing ? editing.note || '' : '')}</textarea></div>
    <div class="modal-foot${editing ? '' : ' stack'}">
      ${editing ? `<button class="btn btn-danger" id="mfDel">Elimina</button>` : ''}
      <button class="btn btn-primary btn-block" id="mfSave">Salva misurazione</button>
    </div>
    <div class="hint" style="margin-top:14px">Consiglio da coach: misura sempre nelle <b>stesse condizioni</b> (appena sveglio, a digiuno) e con il metro ben aderente ma non stretto. Per gli arti misura sempre lo <b>stesso lato</b>. La costanza conta più della precisione assoluta.</div>`);
  b.querySelector('#mfSave').onclick = () => {
    const date = b.querySelector('#mf_date').value || todayISO();
    const values = {}; let any = false;
    MEAS_FIELDS.forEach(f => {
      const raw = b.querySelector('#mf_' + f.key).value.trim().replace(',', '.');
      if (raw !== '') { const n = parseFloat(raw); if (!isNaN(n) && n >= 0) { values[f.key] = Math.round(n * 100) / 100; any = true; } }
    });
    if (!any) { toast('Inserisci almeno un valore'); return; }
    const note = b.querySelector('#mf_note').value.trim();
    if (editing) { editing.date = date; editing.values = values; editing.note = note; }
    else { measList().push({ id: 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), date, values, note }); }
    save(); closeModal(); renderProgress();
    toast(editing ? 'Misurazione aggiornata ✔' : 'Misurazione salvata ✔');
  };
  if (editing) b.querySelector('#mfDel').onclick = () =>
    confirmModal('Elimina misurazione', `Eliminare la rilevazione del ${fmtDateISO(editing.date)}?`, 'Elimina', () => {
      state.measurements = measList().filter(m => m.id !== id);
      save(); closeModal(); renderProgress(); toast('Misurazione eliminata');
    });
}

function openProgressMenu() {
  const b = openModal('Progressi', `<div class="menu-list">
    <button class="btn btn-ghost btn-block" id="pAdd">Nuova misurazione</button>
    <button class="btn btn-ghost btn-block" id="pCsv">Esporta in CSV</button>
    <button class="btn btn-danger btn-block" id="pReset">Azzera tutte le misurazioni</button>
  </div>`);
  b.querySelector('#pAdd').onclick = () => { closeModal(); openMeasurementForm(); };
  b.querySelector('#pCsv').onclick = () => { closeModal(); exportMeasCSV(); };
  b.querySelector('#pReset').onclick = () => confirmModal('Azzera misurazioni', 'Eliminare tutte le misurazioni salvate? L\'operazione non è reversibile.', 'Azzera', () => {

function exportMeasCSV() {
  const list = sortedMeas();
  if (!list.length) { toast('Nessuna misurazione da esportare'); return; }
  const cols = MEAS_FIELDS.filter(f => list.some(e => e.values[f.key] != null));
  const header = ['Data', ...cols.map(f => `${f.label} (${f.unit})`), 'Note'];
  const rows = list.map(e => [e.date, ...cols.map(f => e.values[f.key] != null ? String(e.values[f.key]).replace('.', ',') : ''), (e.note || '').replace(/[\r\n;]+/g, ' ')]);
  const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(';')).join('\r\n');
  downloadText('forge-progressi.csv', '﻿' + csv, 'text/csv;charset=utf-8');
  toast('Progressi esportati (CSV)');
}

/* ── wiring viste ── */
$('goTraining').onclick = () => setView('training');
$('goProgress').onclick = () => setView('progress');
$('btnHome').onclick = () => setView('home');
$('btnHomeP').onclick = () => setView('home');
$('fabAddMeas').onclick = () => openMeasurementForm();
$('btnProgMenu').onclick = openProgressMenu;

/* ── avvio ── */
render();
setView('home');
// Splash solo al primo avvio della sessione: reload e navigazioni interne
// non la rimostrano (niente attrito a ogni apertura della scheda).
(function () {
  const s = $('splash');
  if (!s) return;
  let seen = false;
  try { seen = sessionStorage.getItem('forge_splash') === '1'; sessionStorage.setItem('forge_splash', '1'); } catch (_) {}
  if (seen) { s.style.transition = 'none'; s.classList.add('hide'); }
  else { setTimeout(() => s.classList.add('hide'), 1100); }
})();

/* ── PWA: registrazione service worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
