name: Deploy FORGE to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari per pubblicare su GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta; non annulla quelli in corso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: abilita automaticamente GitHub Pages al primo run
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        # Pubblica l'intera root del repo (app statica: index.html, sw.js, icone, manifest)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
